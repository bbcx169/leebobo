      { id: 5, name: '承租掃帚', price: 2000, tags: ['特色造型', '喜慶'], description: '可承租掃帚(只租不賣)保護套+掃帚為一組\n掃帚上僅可插糖葫蘆，請勿插置其他物品避免損壞\n竹稻草租金$200元 / 押金$1800元\n※歸還時若發現(保護套+掃帚)其一有毀損，則扣$1000元', image: 'https://lh3.googleusercontent.com/d/1HXXgcdfFFvIwCNEF4ETVKYwK6gYA39Tt?auto=format&fit=crop&q=80&w=400' },

    function useScrollFadeIn(dependencies = []) {
        useEffect(() => {
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.05 });
            const timer = setTimeout(() => {
                const elements = document.querySelectorAll('.fade-in-up');
                elements.forEach(el => {
                    if(!el.classList.contains('is-visible')) {
                        const rect = el.getBoundingClientRect();
                        if (rect.top < window.innerHeight && rect.bottom > 0) el.classList.add('is-visible');
                        else observer.observe(el);
                    }
                });
            }, 100);
            return () => { clearTimeout(timer); observer.disconnect(); };
        }, dependencies);
    }

    const BrandStory = ({ navigateTo }) => {

                        <div className="absolute left-0 bottom-1/4 w-64 h-64 bg-warmWood opacity-10 rounded-tr-full rounded-br-full z-0 pointer-events-none transform -translate-x-1/2"></div>
                        <div className="absolute right-10 top-1/4 w-32 h-32 bg-amberRed opacity-5 rounded-full z-0 pointer-events-none"></div>

                        <div className="relative z-10 fade-in-up">
                            <p className="text-warmWood font-sans tracking-[0.3em] text-sm md:text-base mb-6 font-semibold uppercase">Modern Heritage</p>
                            <h1 className="text-5xl lg:text-6xl xl:text-7xl font-serif font-bold text-amberRed mb-8 leading-[1.1] tracking-wide">一串晶瑩<br/>半生守候</h1>
                            <div className="w-16 h-1 bg-warmWood mb-8 rounded-full"></div>

                <section className="max-w-7xl mx-auto px-6 py-16 md:py-24">
                    <div className="flex flex-col-reverse md:flex-row items-center gap-12 lg:gap-20">
                        <div className="w-full md:w-5/12 fade-in-up space-y-6">
                            <div className="inline-block px-4 py-1 border border-warmWood text-warmWood font-serif tracking-widest rounded-full text-sm">Origin</div>
                            <h2 className="text-3xl md:text-4xl font-serif font-bold text-darkWood leading-snug">繁華流轉中的<br/><span className="text-amberRed">溫暖燈火</span></h2>
                            <p className="font-sans text-darkWood/70 leading-loose text-lg font-light text-justify">走進台北寧夏夜市，在鼎沸的人聲與璀璨的霓虹中，總有一處散發著溫潤琥珀光芒的角落。那是「李伯伯糖葫蘆」最初的起點。</p>
                            <p className="font-sans text-darkWood/70 leading-loose text-lg font-light text-justify">五十年前，一輛質樸的手推車，一鍋慢火熬煮的砂糖。我們不僅僅是在販售甜點，更是在這座喧囂的城市裡，為每一個歸人保留一份純粹、質樸的童年回憶。</p>

                        <li><strong>建成公園站：</strong>步行 5 分鐘可抵達平陽街入口。<div className="text-sm text-darkWood/60 mt-1 leading-relaxed">搭乘路線：26, 266, 292, 304</div></li>

            { 
                id: 'parking', title: '停車場 (Parking)',

                content: (
                    <ul className="pl-8 border-l-2 border-warmWood/30 pb-4 space-y-3">

        ];

        return (
            <div className="pt-32 pb-20 relative overflow-hidden min-h-screen">

                <div className="max-w-7xl mx-auto px-6 relative z-10">

                        <h1 className="text-4xl md:text-5xl font-serif font-bold text-darkWood mb-6 tracking-wide">尋找那抹<span className="text-amberRed">琥珀色</span></h1>
                        <div className="w-16 h-1 bg-warmWood mx-auto rounded-full"></div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16 items-stretch">
                        <div className="space-y-8 flex flex-col justify-between fade-in-up">
                            <div className="glass-panel-light p-8 md:p-10 rounded-[2rem] shadow-sm relative overflow-hidden">
                                <div className="absolute -right-8 -top-8 w-24 h-24 bg-amberRed/5 rounded-full"></div>
                                <h3 className="font-serif text-2xl text-amberRed tracking-widest font-bold mb-6 flex items-center gap-3"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> 攤位資訊</h3>
                                <ul className="space-y-6 text-darkWood/80 font-sans text-lg">
                                    <li className="flex items-start gap-4">
                                        <span className="mt-1.5 w-2.5 h-2.5 rounded-full bg-warmWood shrink-0"></span>
                                        <div><p className="font-bold text-darkWood mb-1">地址</p><p className="font-light text-base md:text-lg">臺北市大同區寧夏路<br/>寧夏夜市 61 攤（蓬萊國小前）</p></div>
                                    </li>
                                    <li className="flex items-start gap-4">
                                        <span className="mt-1.5 w-2.5 h-2.5 rounded-full bg-warmWood shrink-0"></span>
                                        <div><p className="font-bold text-darkWood mb-1">聯絡專線</p><p className="font-light text-base md:text-lg tracking-wider">0912-294-022 <span className="text-sm">（聯絡人：李伯伯、聯絡時間：12:00~23:00）</span></p></div>
                                    </li>
                                    <li className="flex items-start gap-4">
                                        <span className="mt-1.5 w-2.5 h-2.5 rounded-full bg-warmWood shrink-0"></span>
                                        <div><p className="font-bold text-darkWood mb-1">營業時間</p><p className="font-light text-base md:text-lg tracking-wider">夜市實體攤位 18:00 ~ 23:00</p></div>
                                    </li>
                                </ul>
                            </div>
                            <div className="glass-panel-light p-8 md:p-10 rounded-[2rem] shadow-sm relative overflow-hidden">
                                <div className="absolute -left-8 -bottom-8 w-24 h-24 bg-warmWood/10 rounded-full"></div>
                                <h3 className="font-serif text-2xl text-amberRed tracking-widest font-bold mb-6 flex items-center gap-3">
                                    <svg className="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                                    交通指引
                                </h3>
                                <div className="text-darkWood/80 font-sans text-base font-light w-full">
                                    {faqs.map((faq, idx) => (
                                        <div key={idx} className="border-b border-warmWood/30">
                                            <button onClick={() => setOpenAccordion(openAccordion === idx ? -1 : idx)} className="w-full py-4 flex justify-between items-center outline-none group">
                                                <span className={`font-bold flex items-center gap-3 transition-colors ${openAccordion === idx ? 'text-amberRed' : 'text-darkWood group-hover:text-amberRed'}`}>
                                                    {faq.icon}
                                                    {faq.title}
                                                </span>
                                                <svg className={`w-5 h-5 transform transition-transform duration-300 ${openAccordion === idx ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 9l-7 7-7-7"></path></svg>
                                            </button>
                                            {openAccordion === idx && <div className="animate-[fadeIn_0.3s_ease-out]">{faq.content}</div>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        
                        <div className="w-full h-[400px] lg:h-auto rounded-[2rem] overflow-hidden shadow-xl fade-in-up border-4 border-pureWhite relative group">
                            <div className="absolute top-4 left-4 z-20 bg-pureWhite/95 backdrop-blur-md px-4 py-2 rounded-full shadow-md text-sm font-sans text-darkWood flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                寧夏夜市第61號攤位
                            </div>
                            <iframe src="https://maps.google.com/maps?q=寧夏夜市&t=&z=16&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" style={{border: 0, filter: 'contrast(1.05) saturate(1.1)'}} allowFullScreen={true} loading="lazy" referrerPolicy="no-referrer-when-downgrade" className="transition-transform duration-700 group-hover:scale-105"></iframe>
                        </div>
                    </div>
                    
                    <div className="mt-16 fade-in-up">
                        <div className="glass-panel-light p-10 lg:p-14 rounded-[2rem] shadow-sm border border-pureWhite text-center relative overflow-hidden">
                            <div className="absolute -right-10 -top-10 w-40 h-40 bg-warmWood opacity-10 rounded-full"></div>
                            <div className="absolute -left-10 -bottom-10 w-40 h-40 bg-amberRed opacity-5 rounded-full"></div>
                            
                            <h3 className="font-serif text-3xl md:text-4xl text-darkWood font-bold mb-4 tracking-wider">線上交流</h3>
                            <p className="text-darkWood/70 font-sans mb-10 text-lg font-light max-w-2xl mx-auto leading-relaxed">追蹤我們的社群，掌握最新優惠與出攤動態。</p>
                            
                            <div className="flex flex-wrap justify-center items-center gap-8 md:gap-12 relative z-10">
                                <a href="https://qr-official.line.me/gs/M_687vjdlz_GW.png?oat_content=qr" target="_blank" rel="noopener noreferrer" className="group flex flex-col items-center">
                                    <div className="w-24 h-24 md:w-28 md:h-28 rounded-2xl bg-pureWhite shadow-sm flex items-center justify-center p-3 transform transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-xl group-hover:border-amberRed border-2 border-transparent">
                                        <img src="https://lh3.googleusercontent.com/d/1GqMTDC4ULAb1RNPr53PogznTrU0KXhYv" alt="LINE 官方帳號" className="w-full h-full object-contain rounded-xl" />
                                    </div>
                                    <span className="mt-4 font-sans text-sm font-medium text-darkWood/80 group-hover:text-amberRed transition-colors tracking-widest">LINE 線上客服</span>
                                </a>
                                <a href="https://www.facebook.com/ningxia.tanghulu" target="_blank" rel="noopener noreferrer" className="group flex flex-col items-center">
                                    <div className="w-24 h-24 md:w-28 md:h-28 rounded-2xl bg-pureWhite shadow-sm flex items-center justify-center p-3 transform transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-xl group-hover:border-amberRed border-2 border-transparent">
                                        <img src="https://lh3.googleusercontent.com/d/1nxPwGWyyNUl9EuxSJtsLiQrVrKIck5lN" alt="Facebook 粉絲專頁" className="w-full h-full object-contain rounded-xl" />
                                    </div>
                                    <span className="mt-4 font-sans text-sm font-medium text-darkWood/80 group-hover:text-amberRed transition-colors tracking-widest">粉絲專頁</span>
                                </a>
                                <a href="https://www.facebook.com/profile.php?id=100057620284780" target="_blank" rel="noopener noreferrer" className="group flex flex-col items-center">
                                    <div className="w-24 h-24 md:w-28 md:h-28 rounded-2xl bg-pureWhite shadow-sm flex items-center justify-center p-3 transform transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-xl group-hover:border-amberRed border-2 border-transparent">
                                        <img src="https://lh3.googleusercontent.com/d/1ZggCQXDqt_C03167yXBHbC_kCR4l4zNn" alt="寧夏夜市" className="w-full h-full object-contain rounded-xl" />
                                    </div>
                                    <span className="mt-4 font-sans text-sm font-medium text-darkWood/80 group-hover:text-amberRed transition-colors tracking-widest">寧夏夜市首頁</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // ==========================================
    // 網站主入口與動態頁面 (App)
    // ==========================================
    function App() {
      const [currentPage, setCurrentPage] = useState('brand');
      const [cart, setCart] = useState({});
      const [alertMsg, setAlertMsg] = useState(null);
      
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submittedOrder, setSubmittedOrder] = useState(null);
      const [formData, setFormData] = useState({ ...initialFormData });

      // 照片授權聲明收放狀態
      const [isTermsOpen, setIsTermsOpen] = useState(false);

      // 訂單查詢狀態擴充
      const [inqName, setInqName] = useState('');
      const [inqPhone, setInqPhone] = useState('');
      const [inqDate, setInqDate] = useState('');
      const [inqStatus, setInqStatus] = useState('idle'); 
      const [inqData, setInqData] = useState(null); 
      const [inqMatches, setInqMatches] = useState([]); 
      const [showEmailPrompt, setShowEmailPrompt] = useState(false);
      const [resendEmail, setResendEmail] = useState('');
      const [isResending, setIsResending] = useState(false);
      const [isPdfDownloaded, setIsPdfDownloaded] = useState(false);

      const [isNavScrolled, setIsNavScrolled] = useState(false);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setIsNavScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        products.forEach(p => { const img = new Image(); img.src = p.image; });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setIsMobileMenuOpen(false);
      }, [currentPage]);

      useEffect(() => {
        if (currentPage === 'list') {
          setSubmittedOrder(null);
        }
        if (currentPage !== 'inquiry') {
          setInqStatus('idle');
          setInqData(null);
          setInqMatches([]);
          setShowEmailPrompt(false);
        }
        setIsPdfDownloaded(false); // 切換頁面時重置下載狀態
      }, [currentPage]);

      useScrollFadeIn([currentPage, inqStatus]);

      const updateCart = (productId, delta) => {
        setCart(prev => {
          const currentQty = prev[productId] || 0;
          const newQty = currentQty + delta;
          if (newQty <= 0) { const newCart = { ...prev }; delete newCart[productId]; return newCart; }
          return { ...prev, [productId]: newQty };
        });
      };

      const handleQuantityChange = (productId, value) => {
        const num = parseInt(value, 10);
        if (isNaN(num) || num <= 0) {
          setCart(prev => { const newCart = { ...prev }; delete newCart[productId]; return newCart; });
        } else { setCart(prev => ({ ...prev, [productId]: num })); }
      };

      const handleFormChange = (e) => {
        const { name, value } = e.target;
        if ((name === 'weddingDate' || name === 'generalDate') && value) {
          if (value < getMinDate()) { setAlertMsg(`日期需為 14 天後（最早：${getMinDate()}）。`); return; }
        }
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const broomQty = cart[5] || 0; 
      const candyQty = Object.entries(cart).reduce((sum, [id, qty]) => parseInt(id) !== 5 ? sum + qty : sum, 0);
      const getCartTotalItems = () => Object.values(cart).reduce((a, b) => a + b, 0);
      
      const candySubtotal = Object.entries(cart).reduce((total, [id, qty]) => {
        if (parseInt(id) === 5) return total;
        const product = products.find(p => p.id === parseInt(id));
        return total + (product ? product.price * qty : 0);
      }, 0);

      let shippingFee = 0;
      let shippingHint = "";
      if (candyQty > 0 || broomQty > 0) {
        if (formData.deliveryCity === 'other') { shippingFee = 0; shippingHint = "(需自取)"; }
        else if (formData.deliveryCity === 'taipei' || formData.deliveryCity === 'new_taipei') {
          shippingFee = candySubtotal >= 5000 ? 0 : 350; shippingHint = candySubtotal >= 5000 ? "(免運)" : "";
        }
      }

      const broomRent = broomQty * 200;
      const broomDeposit = broomQty * 1800;
      const totalPrice = candySubtotal + broomRent + broomDeposit + shippingFee;

      const handleSubmitOrder = async (e) => {
        e.preventDefault();
        let errors = [];
        if (candyQty > 0 && candyQty < 50) errors.push("最低出貨量需達 50 支。");
        if (candyQty === 0 && broomQty === 0) errors.push("您尚未選擇任何商品。");
        if (!formData.deliveryCity) errors.push("請選擇配送縣市。");
        if (errors.length > 0) { setAlertMsg(errors); return; }

        setIsSubmitting(true);
        let specificDetails = "";
        if (formData.eventType === 'wedding') {
            specificDetails = `餐廳：${formData.weddingRestaurant} (${formData.weddingHall})\n地址：${formData.weddingAddress}\n新郎：${formData.groomName} (${formData.groomPhone})\n新娘：${formData.brideName} (${formData.bridePhone})`;
        } else if (formData.eventType === 'school' || formData.eventType === 'other') {
            specificDetails = `地點：${formData.generalLocation}\n地址：${formData.generalAddress}`;
        }

        const now = new Date();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
        let randomLetters = chars.charAt(Math.floor(Math.random() * chars.length)) + chars.charAt(Math.floor(Math.random() * chars.length));
        const orderNumber = `${mm}${dd}${hh}${min}${randomLetters}`;

        const payload = {
            orderDate: now.toLocaleDateString('zh-TW'), orderTime: now.toLocaleTimeString('zh-TW', { hour12: false }),
            orderNumber: orderNumber, ordererName: formData.ordererName, ordererPhone: formData.ordererPhone, ordererEmail: formData.ordererEmail,
            recipientName: formData.recipientName, recipientPhone: formData.recipientPhone,
            deliveryCity: formData.deliveryCity === 'taipei' ? '臺北市' : (formData.deliveryCity === 'new_taipei' ? '新北市' : '外縣市'),
            eventType: formData.eventType === 'wedding' ? '浪漫婚禮 / 喜宴' : (formData.eventType === 'school' ? '校園活動 / 園遊會' : '其他'),
            eventDate: formData.weddingDate || formData.generalDate, eventTime: formData.weddingTime || formData.generalTime,
            specificDetails: specificDetails,
            itemsList: Object.entries(cart).filter(([_, q]) => q > 0).map(([id, q]) => { const p = products.find(prod => prod.id === parseInt(id)); return `- ${p.name} x${q} (NT$${p.price * q})`; }).join('\n'),
            candyTotal: candySubtotal, broomRent: broomRent, broomDeposit: broomDeposit, shippingFee: shippingFee,
            totalAmount: totalPrice, notes: formData.notes, cart: cart
        };

        try {
          const response = await fetch(SCRIPT_URL, { 
            method: 'POST', 
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload) 
          });
          const result = await response.json();

          if (result.status === 'success') {
            setSubmittedOrder({ 
              payload: payload, orderNumber: orderNumber, cart: { ...cart }, candyQty, broomQty, 
              candySubtotal, broomRent, broomDeposit, shippingFee, totalPrice, 
              pdfDownloadUrl: result.pdfDownloadUrl 
            });
            setCart({}); setFormData({ ...initialFormData }); setCurrentPage('success'); 
          } else {
            setAlertMsg(["⚠️ 訂單送出失敗", `錯誤：${result.message}`]);
          }
        } catch (error) {
          setAlertMsg(["⚠️ 訂單連線失敗", "請檢查您的網路連線，或稍後再重試。", `💡 系統除錯訊息：${error.message}`]);
        } finally { setIsSubmitting(false); }
      };

      const handleInquirySubmit = async (e) => {
        e.preventDefault();
        setIsPdfDownloaded(false); // 重新查詢時重置下載狀態
        if (!inqName || !inqPhone || !inqDate) { setAlertMsg("請完整填寫所有查詢欄位！"); return; }
        setInqStatus('loading');
        try {
            const url = `${SCRIPT_URL}?action=query_order&name=${encodeURIComponent(inqName)}&phone=${encodeURIComponent(inqPhone)}&date=${encodeURIComponent(inqDate)}`;
            const res = await fetch(url);
            const resData = await res.json();
            
            if (resData.status === 'success') {
                if (resData.data.length > 1) {
                    setInqMatches(resData.data);
                    setInqStatus('multiple_matches');
                } else if (resData.data.length === 1) {
                    setInqData(resData.data[0]);
                    setResendEmail(resData.data[0].ordererEmail || '');
                    setInqStatus('success');
                } else {
                    setInqStatus('not_found');
                }
            } else { 
                setInqStatus('not_found'); 
            }
        } catch (err) { console.error(err); setInqStatus('error'); }
      };

      // 點擊下載時打開連結並變更狀態
      const handleDownloadPDF = (url) => {
        if (url) {
            window.open(url, '_blank');
            setIsPdfDownloaded(true);
        } else {
            setAlertMsg("⚠️ 尚未取得 PDF 下載連結，請稍後再試或聯繫客服。");
        }
      };

      const handleResendEmail = async () => {
          if (!resendEmail) { setAlertMsg("請輸入聯絡信箱！"); return; }
          setIsResending(true);
          try {
              const response = await fetch(SCRIPT_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                  body: JSON.stringify({ action: 'resend_email', orderNumber: inqData.orderNumber, email: resendEmail })
              });
              const result = await response.json();
              if (result.status === 'success') {
                  setAlertMsg("✅ 訂單 PDF 明細已成功補發至您的信箱！");
                  setShowEmailPrompt(false);
              } else {
                  setAlertMsg(["補發失敗，請稍後再試。", `錯誤：${result.message}`]);
              }
          } catch(err) { setAlertMsg(["補發失敗，請稍後再試。", `錯誤：${err.message}`]); } finally { setIsResending(false); }
      };

      const renderTimeOptions = () => {
        let options = [<option key="empty" value="" disabled>請選擇時間</option>];
        for (let m = 6 * 60 + 30; m <= 19 * 60; m += 30) {
            const h = Math.floor(m / 60);
            const mins = m % 60;
            const timeStr = `${String(h).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
            options.push(<option key={timeStr} value={timeStr}>{timeStr}</option>);
        }
        return options;
      };

      const OrderReceiptContent = ({ order }) => (
          <div className="bg-pureWhite border-2 border-warmWood/30 border-solid rounded-xl p-6 md:p-8 text-left shadow-sm mb-8 mx-auto relative max-w-2xl text-darkWood">
            <div className="text-center mb-6 border-b-2 border-creamBg pb-4">
              <h3 className="text-2xl font-bold text-amberRed tracking-widest font-serif">李伯伯糖葫蘆</h3>
              <p className="text-darkWood/60 text-sm mt-1">訂購明細單 - {order.orderNumber}</p>
              <p className="text-xs text-darkWood/50 mt-1">訂購時間：{order.payload.orderDate} {order.payload.orderTime}</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-sm bg-creamBg/50 p-4 rounded-lg border border-warmWood/20">
              <div>
                <p className="mb-1"><span className="font-bold">訂購人：</span>{order.payload.ordererName} ({order.payload.ordererPhone})</p>
                <p className="mb-1"><span className="font-bold">收件人：</span>{order.payload.recipientName} ({order.payload.recipientPhone})</p>
                <p><span className="font-bold">活動類型：</span>{order.payload.eventType}</p>
              </div>
              <div>
                <p className="mb-1"><span className="font-bold">活動日期：</span>{order.payload.eventDate || '未填寫'}</p>
                <p className="mb-1"><span className="font-bold">收貨時間：</span>{order.payload.eventTime || '未填寫'}</p>
                <p><span className="font-bold">配送縣市：</span>{order.payload.deliveryCity}</p>
              </div>
              <div className="md:col-span-2 pt-2 mt-2 border-t border-warmWood/30">
                <p className="whitespace-pre-line"><span className="font-bold">活動細節：</span><br/>{order.payload.specificDetails || '無'}</p>
                {order.payload.notes && <p className="mt-2 text-darkWood/70 italic">備註：{order.payload.notes}</p>}
              </div>
            </div>
            <div className="mb-6">
              <h4 className="font-bold text-darkWood border-b border-warmWood/30 pb-2 mb-3">訂購商品</h4>
              <table className="w-full text-sm text-darkWood/80">
                <thead>
                  <tr className="text-left text-darkWood/60 border-b border-creamBg"><th className="pb-2 font-medium">品項</th><th className="pb-2 font-medium text-center">單價</th><th className="pb-2 font-medium text-center">數量</th><th className="pb-2 font-medium text-right">小計</th></tr>
                </thead>
                <tbody className="divide-y divide-creamBg">
                  {Object.entries(order.cart).filter(([_, qty]) => qty > 0).map(([id, qty]) => {
                    const p = products.find(prod => prod.id === parseInt(id)); if (!p) return null;
                    return <tr key={id}><td className="py-3 pr-2">{p.name}</td><td className="py-3 text-center">NT$ {p.price}</td><td className="py-3 text-center">x {qty}</td><td className="py-3 text-right">NT$ {(p.price * qty).toLocaleString()}</td></tr>;
                  })}
                </tbody>
              </table>
            </div>
            <div className="border-t-2 border-warmWood/30 pt-4 space-y-2 text-sm text-darkWood/80">
              <div className="flex justify-between"><span>商品小計 ({order.candyQty} 支)</span><span>NT$ {order.candySubtotal.toLocaleString()}</span></div>
              {order.broomQty > 0 && (<><div className="flex justify-between"><span>掃帚租金 ({order.broomQty} 組)</span><span>NT$ {order.broomRent.toLocaleString()}</span></div><div className="flex justify-between opacity-60"><span>掃帚押金 (歸還後退回)</span><span>NT$ {order.broomDeposit.toLocaleString()}</span></div></>)}
              <div className="flex justify-between"><span>配送運費</span><span>NT$ {order.shippingFee.toLocaleString()}</span></div>
              <div className="flex justify-between items-center pt-3 mt-3 border-t border-creamBg"><span className="font-bold text-darkWood text-base">訂單總金額</span><span className="font-black text-amberRed text-xl">NT$ {order.totalPrice.toLocaleString()}</span></div>
            </div>
          </div>
      );

      const handleNavigate = (page) => {
          setCurrentPage(page === 'products' ? 'list' : page);
      };

      return (
        <div className="min-h-screen relative overflow-x-hidden font-sans text-darkWood bg-creamBg">
          <div className="fixed inset-0 z-0 pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-warmWood mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse rounded-full"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-amberRed mix-blend-multiply filter blur-[120px] opacity-[0.08] rounded-full"></div>
          </div>

          <nav className={`fixed w-full z-50 transition-all duration-500 ${isNavScrolled ? 'px-0' : 'px-0'}`}>
            <div className={`mx-auto flex justify-between items-center max-w-7xl transition-all duration-300 ${isNavScrolled ? 'glass-nav-scrolled shadow-sm w-full px-6 py-4 rounded-none' : 'glass-panel-light mx-4 mt-4 rounded-2xl px-6 py-4'}`}>
                <div className="font-serif text-2xl font-bold tracking-widest text-amberRed cursor-pointer" onClick={() => handleNavigate('brand')}>李伯伯糖葫蘆</div>
                
                <div className="hidden md:flex items-center space-x-8 text-sm font-medium tracking-wider text-darkWood">
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('brand'); }} className={`transition-colors duration-300 ${currentPage === 'brand' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>品牌故事</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('process'); }} className={`transition-colors duration-300 ${currentPage === 'process' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>訂購流程</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('list'); }} className={`transition-colors duration-300 ${['list', 'order', 'success'].includes(currentPage) ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>商品訂購</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('inquiry'); }} className={`transition-colors duration-300 ${currentPage === 'inquiry' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>訂單查詢</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('contact'); }} className={`transition-colors duration-300 ${currentPage === 'contact' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>聯絡我們</a>
                    
                    {['list', 'order'].includes(currentPage) && (
                        <button onClick={() => handleNavigate('order')} className="relative flex items-center justify-center w-11 h-11 rounded-full bg-amberRed text-white shadow-md hover:bg-pureWhite hover:text-amberRed transition-all ml-4 animate-bounce">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                            {getCartTotalItems() > 0 && <span className="absolute -top-1 -right-1 bg-pureWhite text-amberRed text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center shadow-md border-2 border-amberRed">{getCartTotalItems()}</span>}
                        </button>
                    )}
                </div>

                <div className="md:hidden flex items-center space-x-3">
                    {['list', 'order'].includes(currentPage) && (
                        <button onClick={() => handleNavigate('order')} className="relative flex items-center justify-center w-10 h-10 rounded-full bg-amberRed text-white shadow-md hover:bg-pureWhite hover:text-amberRed transition-all animate-bounce">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                            {getCartTotalItems() > 0 && <span className="absolute -top-1 -right-1 bg-pureWhite text-amberRed text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center shadow-md border-2 border-amberRed">{getCartTotalItems()}</span>}
                        </button>
                    )}
                    <button className="text-amberRed focus:outline-none p-1" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
                </div>
            </div>

            {isMobileMenuOpen && (
                <div className="md:hidden glass-panel-light mx-4 mt-2 p-5 rounded-2xl flex flex-col space-y-4 text-center text-darkWood tracking-wider shadow-lg">
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('brand'); }} className={`py-2 border-b border-warmWood/20 ${currentPage === 'brand' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>品牌故事</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('process'); }} className={`py-2 border-b border-warmWood/20 ${currentPage === 'process' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>訂購流程</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('list'); }} className={`py-2 border-b border-warmWood/20 ${['list', 'order', 'success'].includes(currentPage) ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>商品訂購</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('inquiry'); }} className={`py-2 border-b border-warmWood/20 ${currentPage === 'inquiry' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>訂單查詢</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); handleNavigate('contact'); }} className={`py-2 ${currentPage === 'contact' ? 'text-amberRed font-bold' : 'hover:text-amberRed'}`}>聯絡我們</a>
                </div>
            )}
          </nav>

          {alertMsg && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center">
              <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" onClick={() => setAlertMsg(null)}></div>
              <div className="bg-pureWhite rounded-2xl shadow-2xl p-6 md:p-8 max-w-md w-full mx-4 relative z-10 fade-in-up is-visible">
                <h3 className="text-xl font-bold text-gray-900 mb-4 pb-2 border-b border-gray-100">系統提示</h3>
                <div className="text-gray-700 mb-6 text-sm leading-relaxed text-left">
                  {Array.isArray(alertMsg) ? <ul className="space-y-2">{alertMsg.map((m, idx) => <li key={idx} className={m.includes('⚠️') || m.includes('✅') ? "text-amberRed font-bold text-base" : m.includes('💡') ? "text-gray-400 text-xs mt-4 break-all" : "text-gray-700"}>{m}</li>)}</ul> : alertMsg}
                </div>
                <button onClick={() => setAlertMsg(null)} className="w-full bg-amberRed hover:bg-darkWood text-white font-bold py-3 rounded-xl transition-colors">我知道了</button>
              </div>
            </div>
          )}

          {currentPage === 'brand' && <BrandStory navigateTo={handleNavigate} />}
          {currentPage === 'process' && <OrderProcess navigateTo={handleNavigate} />}
          {currentPage === 'contact' && <ContactUs />}

          {/* === 產品列表區塊 === */}
          {currentPage === 'list' && (
            <div className="relative z-10 container mx-auto px-6 pt-32 pb-16 max-w-7xl fade-in-up">
              <header className="text-center mb-16">
                <div className="inline-block relative cursor-pointer" onClick={() => handleNavigate('list')}>
                  <h1 className="text-5xl md:text-6xl lg:text-7xl font-bold text-amberRed mb-4 tracking-widest drop-shadow-sm font-serif">商品選購</h1>
                  <div className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 w-32 h-1.5 bg-warmWood rounded-full shadow-sm"></div>
                </div>
                <p className="mt-8 text-lg md:text-xl text-darkWood tracking-[0.2em] font-medium opacity-80">傳承寧夏夜市三十年・琥珀糖衣下的酸甜記憶</p>
              </header>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                {products.map((product) => (
                  <div key={product.id} className="group relative rounded-3xl p-5 transition-all duration-500 ease-out bg-pureWhite/50 backdrop-blur-[10px] border border-pureWhite/80 shadow-[0_8px_32px_0_rgba(165,42,42,0.05)] hover:-translate-y-2 hover:bg-pureWhite/80 hover:shadow-[0_20px_40px_0_rgba(165,42,42,0.1)] hover:border-pureWhite flex flex-col h-full">
                    <div className="relative w-full aspect-square rounded-2xl overflow-hidden mb-5 shadow-sm bg-pureWhite/60 flex items-center justify-center p-3">
                      <img src={product.image} alt={product.name} className="w-full h-full object-cover rounded-xl transition-transform duration-700 ease-in-out group-hover:scale-110 drop-shadow-sm mix-blend-multiply" loading="lazy" decoding="async" />
                      <div className={`absolute top-3 ${product.id >= 1 && product.id <= 4 ? 'left-3' : 'right-3'} w-14 h-14 bg-amberRed rounded-full flex flex-col items-center justify-center text-white shadow-md border-2 border-pureWhite transform group-hover:rotate-12 transition-transform duration-300`}>
                        <span className="text-[10px] font-medium opacity-90 -mb-1 tracking-wider">NT$</span><span className="text-lg font-bold font-serif">{product.price}</span>
                      </div>
                    </div>
                    <div className="px-2 flex-grow flex flex-col">
                      <h3 className="text-xl font-bold text-amberRed mb-3 group-hover:text-darkWood transition-colors tracking-wide font-serif">{product.name}</h3>
                      <div className="flex flex-wrap gap-2 mb-3">{product.tags.map((tag, index) => <span key={index} className="px-2 py-1 text-xs font-bold tracking-widest rounded-full bg-warmWood/15 text-darkWood border border-warmWood/30 shadow-sm backdrop-blur-sm">{tag}</span>)}</div>
                      <p className="text-[13px] text-darkWood/70 leading-relaxed whitespace-pre-line group-hover:text-darkWood transition-colors flex-grow">{product.description}</p>
                      <div className="mt-4 pt-4 border-t border-warmWood/30 flex items-center justify-between">
                        <span className="text-sm font-bold text-darkWood/80">數量</span>
                        <div className="flex items-center space-x-3 bg-pureWhite/80 rounded-full px-1 py-1 shadow-sm border border-pureWhite">
                          <button onClick={() => updateCart(product.id, -1)} className="w-8 h-8 rounded-full bg-pureWhite text-amberRed font-bold shadow-sm hover:bg-amberRed hover:text-white transition-colors flex items-center justify-center text-lg">-</button>
                          <input type="number" min="0" value={cart[product.id] || 0} onChange={(e) => handleQuantityChange(product.id, e.target.value)} className="w-10 text-center font-bold text-darkWood bg-transparent border-none outline-none focus:ring-0 p-0 m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none" style={{ MozAppearance: 'textfield' }} />
                          <button onClick={() => updateCart(product.id, 1)} className="w-8 h-8 rounded-full bg-pureWhite text-amberRed font-bold shadow-sm hover:bg-amberRed hover:text-white transition-colors flex items-center justify-center text-lg">+</button>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="mt-12 flex justify-center">
                <button onClick={() => handleNavigate('order')} className="group relative flex items-center gap-3 px-8 py-4 bg-amberRed text-white rounded-full font-bold text-lg shadow-lg hover:shadow-xl hover:-translate-y-1 hover:bg-darkWood transition-all">
                  前往購物車
                  <svg xmlns="http://www.w3.org/2000/svg" className="transform group-hover:translate-x-1 transition-transform" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
              </div>
            </div>
          )}

          {/* === 訂單填寫區塊 === */}
          {currentPage === 'order' && (
            <div className="relative z-10 max-w-6xl mx-auto px-4 md:px-8 pt-32 pb-16 fade-in-up">
              <div className="mb-4 md:mb-6 flex justify-start">
                 <button onClick={() => handleNavigate('list')} className="text-darkWood text-sm md:text-base font-bold flex items-center gap-2 transition-transform hover:-translate-x-1 bg-pureWhite/60 px-4 py-2.5 rounded-full shadow-sm backdrop-blur-sm border border-pureWhite hover:bg-pureWhite hover:shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    返回選購
                 </button>
              </div>

              <header className="text-center mb-10">
                 <h1 className="text-3xl md:text-5xl font-bold text-amberRed mb-4 tracking-wider leading-snug font-serif">讓李伯伯為您的重要時刻增添甜蜜</h1>
                 <p className="text-darkWood/70 text-lg md:text-xl">婚禮佈置 / 校園活動 / 品牌活動 預約訂購</p>
              </header>

              <main className="flex flex-col lg:flex-row gap-8 items-start">
                <section className="w-full lg:w-5/12 bg-pureWhite/65 backdrop-blur-[12px] border border-pureWhite shadow-[0_10px_30px_-10px_rgba(165,42,42,0.08)] rounded-2xl p-6 md:p-8 lg:sticky lg:top-28 max-h-[calc(100vh-8rem)] overflow-y-auto custom-scrollbar flex flex-col">
                  <h2 className="text-2xl font-bold text-darkWood mb-6 flex items-center gap-2 shrink-0 font-serif"><svg className="w-6 h-6 text-amberRed" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg> 挑選甜蜜組合</h2>
                  
                  <div className="space-y-4 mb-6 flex-grow">
                    {Object.keys(cart).length === 0 ? (
                      <div className="text-center py-10 flex flex-col items-center justify-center">
                          <p className="text-darkWood/50 mb-5 text-lg">您的購物車目前是空的喔！</p>
                          <button type="button" onClick={() => handleNavigate('list')} className="group inline-flex items-center gap-2 px-6 py-2.5 border-2 border-amberRed text-amberRed rounded-full font-bold tracking-widest hover:bg-amberRed hover:text-white transition-all shadow-sm hover:shadow-md">
                              <svg className="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                              返回選購
                          </button>
                      </div>
                    ) : (
                      Object.entries(cart).map(([id, qty]) => {
                        const p = products.find(prod => prod.id === parseInt(id)); if (!p) return null;
                        return (
                          <div key={id} className="flex items-center justify-between p-3 bg-pureWhite/60 rounded-xl border border-pureWhite">
                            <div className="flex-1 pr-4"><h3 className="font-bold text-darkWood">{p.name}</h3><span className="text-amberRed font-medium text-sm">NT$ {p.price}</span></div>
                            <div className="flex items-center gap-2 bg-pureWhite rounded-lg p-1 border border-warmWood/20">
                              <button type="button" onClick={() => updateCart(p.id, -1)} className="w-7 h-7 flex items-center justify-center rounded text-darkWood/60 hover:bg-creamBg">-</button>
                              <input type="number" min="0" value={qty} onChange={(e) => handleQuantityChange(p.id, e.target.value)} className="w-9 text-center font-bold text-darkWood bg-transparent border-none outline-none p-0 [&::-webkit-inner-spin-button]:appearance-none" />
                              <button type="button" onClick={() => updateCart(p.id, 1)} className="w-7 h-7 flex items-center justify-center rounded text-darkWood/60 hover:bg-creamBg">+</button>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>

                  <div className="shrink-0 mt-auto pt-2">
                    <hr className="border-warmWood/40 mb-4" />
                    <div className="space-y-3 mb-4">
                      <div className="flex justify-between text-sm text-darkWood/70"><span>商品小計 ({candyQty} 支)</span><span>NT$ {candySubtotal.toLocaleString()}</span></div>
                      {broomQty > 0 && (<><div className="flex justify-between text-sm text-darkWood/70"><span>掃帚租金 ({broomQty} 組)</span><span>NT$ {broomRent.toLocaleString()}</span></div><div className="flex justify-between text-sm text-darkWood/70"><span>掃帚押金 <span className="text-xs opacity-60">(歸還後退回)</span></span><span>NT$ {broomDeposit.toLocaleString()}</span></div></>)}
                      <div className="flex justify-between text-sm text-darkWood/70"><span>配送運費 <span className="text-xs text-amberRed font-medium">{shippingHint}</span></span><span>NT$ {shippingFee.toLocaleString()}</span></div>
                    </div>
                    <hr className="border-warmWood/40 mb-4" />
                    <div className="flex justify-between items-end">
                      <span className="text-darkWood font-bold">預估總金額</span>
                      <div className="text-right"><span className="text-sm text-amberRed mr-1">NT$</span><span className="text-3xl font-bold text-amberRed inline-block">{totalPrice.toLocaleString()}</span></div>
                    </div>
                    {candyQty > 0 && candyQty < 50 && <p className="text-sm font-bold text-amberRed mt-4 bg-red-50/80 p-3 rounded-lg text-center">⚠️ 最低出貨量需達 50 支，目前僅 {candyQty} 支</p>}
                    {formData.deliveryCity === 'other' && <p className="text-sm font-bold text-amberRed mt-2 bg-red-50/80 p-3 rounded-lg text-center">⚠️ 外縣市目前無法宅配，需配合商家時間地點自取</p>}
                  </div>
                </section>

                <section className="w-full lg:w-7/12 bg-pureWhite/65 backdrop-blur-[12px] border border-pureWhite shadow-[0_10px_30px_-10px_rgba(165,42,42,0.08)] rounded-2xl p-6 md:p-8">
                  <h2 className="text-2xl font-bold text-darkWood mb-6 flex items-center gap-2 font-serif"><svg className="w-6 h-6 text-amberRed" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> 填寫活動資訊</h2>

                  <form onSubmit={handleSubmitOrder} className="space-y-6">
                    <div>
                      <label className="block text-sm font-medium text-darkWood mb-1">活動類型 *</label>
                      <select name="eventType" required value={formData.eventType} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors appearance-none">
                        <option value="" disabled>請選擇活動類型</option><option value="wedding">浪漫婚禮 / 喜宴</option><option value="school">校園活動 / 園遊會</option><option value="other">其他</option>
                      </select>
                    </div>

                    <div className="space-y-6 bg-creamBg/50 p-5 rounded-xl border border-warmWood/20">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label className="block text-sm font-medium text-darkWood mb-1">訂購人姓名 *</label><input type="text" name="ordererName" required placeholder="例：王大明" value={formData.ordererName} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                        <div><label className="block text-sm font-medium text-darkWood mb-1">訂購人電話 *</label><input type="tel" name="ordererPhone" required placeholder="例：0912345678" value={formData.ordererPhone} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                        <div className="md:col-span-2">
                            <label className="block text-sm font-medium text-darkWood mb-1">聯絡信箱 (Email)</label>
                            <input type="email" name="ordererEmail" placeholder="例：example@gmail.com" value={formData.ordererEmail} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" />
                            <p className="text-xs text-amberRed mt-1 font-medium">※ 強烈建議填寫，系統將於訂單成立後自動寄送 PDF 明細備份至您的信箱。</p>
                        </div>
                        <div><label className="block text-sm font-medium text-darkWood mb-1">收貨人姓名 *</label><input type="text" name="recipientName" required placeholder="例：陳小美" value={formData.recipientName} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                        <div><label className="block text-sm font-medium text-darkWood mb-1">收貨人電話 *</label><input type="tel" name="recipientPhone" required placeholder="例：0987654321" value={formData.recipientPhone} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                      </div>
                      <hr className="border-warmWood/30" />
                      <div>
                        <label className="block text-sm font-medium text-darkWood mb-1">配送縣市 *</label>
                        <select name="deliveryCity" required value={formData.deliveryCity} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors appearance-none">
                          <option value="" disabled>請選擇配送縣市</option><option value="taipei">臺北市</option><option value="new_taipei">新北市</option><option value="other">外縣市（目前無法宅配，需配合商家時間地點自取）</option>
                        </select>
                        <p className="text-xs text-amberRed mt-2">* 總訂購量最低需達 50 支。訂單滿 5,000 元（不含掃帚租賃費）享免運；未滿需酌收運費 350 元。</p>
                      </div>
                    </div>

                    {formData.eventType === 'wedding' && (
                      <div className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div><label className="block text-sm font-medium text-darkWood mb-1">婚宴日期 * <span className="text-xs text-amberRed font-bold ml-1 tracking-wider">(請選西元年)</span> <span className="text-xs opacity-60 font-normal">(需14天後)</span></label><input type="date" name="weddingDate" required min={getMinDate()} value={formData.weddingDate} onChange={handleFormChange} className="w-full h-[52px] px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                          <div><label className="block text-sm font-medium text-darkWood mb-1">婚宴當日收貨時間 <span className="text-xs opacity-60 font-normal">(24小時制)</span></label><select name="weddingTime" value={formData.weddingTime} onChange={handleFormChange} className="w-full h-[52px] px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors appearance-none">{renderTimeOptions()}</select></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div><label className="block text-sm font-medium text-darkWood mb-1">婚宴餐廳名稱 *</label><input type="text" name="weddingRestaurant" required placeholder="例：OO婚宴會館" value={formData.weddingRestaurant} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                          <div><label className="block text-sm font-medium text-darkWood mb-1">廳別</label><input type="text" name="weddingHall" placeholder="例：鳳凰廳" value={formData.weddingHall} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                        </div>
                        <div><label className="block text-sm font-medium text-darkWood mb-1">婚宴餐廳地址</label><input type="text" name="weddingAddress" placeholder="例：台北市信義區OO路123號" value={formData.weddingAddress} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                        <div className="bg-darkWood text-pureWhite text-center py-2.5 rounded-lg font-medium tracking-widest mt-8 shadow-sm">新人資訊</div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <input type="text" name="groomName" placeholder="新郎姓名" value={formData.groomName} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" />
                          <input type="tel" name="groomPhone" placeholder="新郎電話" value={formData.groomPhone} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" />
                          <input type="text" name="brideName" placeholder="新娘姓名" value={formData.brideName} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" />
                          <input type="tel" name="bridePhone" placeholder="新娘電話" value={formData.bridePhone} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" />
                        </div>
                      </div>
                    )}

                    {(formData.eventType === 'school' || formData.eventType === 'other') && (
                      <div className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div><label className="block text-sm font-medium text-darkWood mb-1">活動日期 * <span className="text-xs text-amberRed font-bold ml-1 tracking-wider">(請選西元年)</span> <span className="text-xs opacity-60 font-normal">(需14天後)</span></label><input type="date" name="generalDate" required min={getMinDate()} value={formData.generalDate} onChange={handleFormChange} className="w-full h-[52px] px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                          <div><label className="block text-sm font-medium text-darkWood mb-1">活動當日收貨時間 <span className="text-xs opacity-60 font-normal">(24小時制)</span></label><select name="generalTime" value={formData.generalTime} onChange={handleFormChange} className="w-full h-[52px] px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors appearance-none">{renderTimeOptions()}</select></div>
                        </div>
                        <div><label className="block text-sm font-medium text-darkWood mb-1">活動地點名稱 *</label><input type="text" name="generalLocation" required placeholder="例：OO國小 / OO公司" value={formData.generalLocation} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                        <div><label className="block text-sm font-medium text-darkWood mb-1">活動完整地址</label><input type="text" name="generalAddress" placeholder="例：台北市大安區羅斯福路四段1號" value={formData.generalAddress} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" /></div>
                      </div>
                    )}

                    <div><label className="block text-sm font-medium text-darkWood mb-1">備註</label><textarea name="notes" rows="4" placeholder="若有特殊需求請在此填寫..." value={formData.notes} onChange={handleFormChange} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors resize-none"></textarea></div>
                    <button type="submit" disabled={isSubmitting} className="w-full bg-amberRed hover:bg-darkWood disabled:bg-warmWood/50 text-white font-bold text-lg py-4 px-8 rounded-xl shadow-lg transition-all flex justify-center items-center">{isSubmitting ? "資料傳送中..." : "送出訂單"}</button>
                  </form>
                </section>
              </main>
            </div>
          )}

          {/* === 訂單查詢區塊 === */}
          {currentPage === 'inquiry' && (
             <div className="relative z-10 max-w-4xl mx-auto px-4 md:px-8 pt-32 pb-16 fade-in-up">
                <header className="text-center mb-10">
                    <h1 className="text-3xl md:text-5xl font-bold text-amberRed mb-4 tracking-wider leading-snug font-serif">訂單查詢</h1>
                    <p className="text-darkWood/70 text-lg md:text-xl">隨時掌握您的甜蜜預約進度</p>
                </header>

                {inqStatus === 'multiple_matches' ? (
                    <div className="bg-pureWhite/95 border border-pureWhite shadow-xl rounded-2xl p-6 md:p-10 mx-auto max-w-2xl relative overflow-hidden animate-[fadeIn_0.5s_ease-out]">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-warmWood to-amberRed"></div>
                        <h3 className="text-2xl font-bold text-darkWood mb-4 font-serif text-center">找到多筆符合的訂單</h3>
                        <p className="text-darkWood/80 font-medium mb-8 text-center">您在同一天有多筆預約，請選擇您要查看的明細：</p>
                        
                        <div className="space-y-4">
                            {inqMatches.map((order, idx) => (
                                <div key={idx} onClick={() => {
                                    setInqData(order);
                                    setResendEmail(order.ordererEmail || '');
                                    setInqStatus('success');
                                    setIsPdfDownloaded(false); // 選擇不同訂單時重置下載狀態
                                }} className="bg-pureWhite/80 hover:bg-white border border-warmWood/30 hover:border-amberRed cursor-pointer p-5 rounded-xl shadow-sm hover:shadow-md transition-all flex justify-between items-center group">
                                    <div>
                                        <p className="font-bold text-darkWood mb-1 text-lg">訂購時間：{order.orderDate} {order.orderTime}</p>
                                        <p className="text-sm text-darkWood/70">總金額：NT$ {order.totalPrice.toLocaleString()}</p>
                                    </div>
                                    <div className="text-amberRed transform group-hover:translate-x-2 transition-transform">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="mt-8 text-center border-t border-warmWood/20 pt-6">
                            <button onClick={() => { setInqStatus('idle'); setInqName(''); setInqPhone(''); setInqDate(''); }} className="text-warmWood font-bold hover:text-darkWood transition-colors">
                                ← 返回重新查詢
                            </button>
                        </div>
                    </div>
                ) : (inqStatus === 'idle' || inqStatus === 'loading' || inqStatus === 'error' || inqStatus === 'not_found') ? (
                    <div className="bg-pureWhite/95 border border-pureWhite shadow-xl rounded-2xl p-6 md:p-10 mx-auto max-w-xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-warmWood to-amberRed"></div>
                        <p className="text-darkWood/80 font-medium mb-8 text-center">請輸入以下三項資訊進行身分驗證，以確保您的個資安全。</p>
                        
                        <form onSubmit={handleInquirySubmit} className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-darkWood mb-1">訂購人姓名</label>
                                <input type="text" required value={inqName} onChange={e=>setInqName(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" placeholder="例：王大明" />
                                <p className="text-xs text-amberRed mt-1.5">* 溫馨提示：請輸入與當初訂購時完全相同的姓名唷！</p>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-darkWood mb-1">訂購人手機號碼</label>
                                <input type="tel" required value={inqPhone} onChange={e=>setInqPhone(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" placeholder="例：0912345678" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-darkWood mb-1">活動日期 <span className="text-xs text-amberRed font-bold ml-1 tracking-wider">(請選西元年)</span></label>
                                <input type="date" required value={inqDate} onChange={e=>setInqDate(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 bg-pureWhite focus:outline-none focus:ring-2 focus:ring-amberRed transition-colors" />
                            </div>
                            <button type="submit" disabled={inqStatus === 'loading'} className="w-full bg-amberRed hover:bg-darkWood disabled:bg-warmWood/50 text-white font-bold text-lg py-4 rounded-xl shadow-md transition-all mt-4">
                                {inqStatus === 'loading' ? '安全驗證與查詢中...' : '送出查詢'}
                            </button>
                        </form>

                        {inqStatus === 'not_found' && (
                            <div className="mt-8 bg-red-50 border border-red-200 text-amberRed p-5 rounded-xl text-sm leading-relaxed">
                                <strong>⚠️ 找不到符合的訂單。</strong><br/><br/>請確認您的『姓名』、『手機號碼』與『活動日期』是否正確？若一直無法查詢，歡迎點擊下方按鈕聯繫 LINE 客服為您協助。
                                <a href="https://lin.ee/5QYll8k" target="_blank" className="mt-3 block text-center bg-[#06C755] text-white py-2 rounded-lg font-bold w-full hover:bg-[#05b34c]">聯繫 LINE 客服</a>
                            </div>
                        )}
                    </div>
                ) : (
                    <div className="bg-pureWhite/95 border border-pureWhite shadow-xl rounded-3xl p-6 md:p-12 text-center animate-[fadeIn_0.5s_ease-out]">
                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg className="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 className="text-3xl font-bold mb-4 font-serif text-darkWood">查詢成功！</h2>
                        <p className="text-darkWood/70 mb-8">以下為您的訂單明細紀錄。</p>

                        <div className="mb-8 text-left">
                            <OrderReceiptContent 
                                order={{
                                    orderNumber: inqData.orderNumber,
                                    payload: inqData, cart: inqData.cart, candyQty: Object.entries(inqData.cart).reduce((s, [id, q]) => parseInt(id) !== 5 ? s + q : s, 0),
                                    broomQty: inqData.cart['5'] || 0, candySubtotal: inqData.candySubtotal, broomRent: inqData.broomRent,
                                    broomDeposit: inqData.broomDeposit, shippingFee: inqData.shippingFee, totalPrice: inqData.totalPrice
                                }} 
                            />
                        </div>

                        <div className="flex flex-col sm:flex-row justify-center gap-4 mb-8">
                            <button onClick={() => handleDownloadPDF(inqData.pdfDownloadUrl)} className={`inline-flex items-center justify-center gap-2 text-white py-3.5 px-8 rounded-xl font-bold shadow-md transition-all w-full sm:w-auto ${isPdfDownloaded ? 'bg-[#06C755] hover:bg-[#05b34c]' : 'bg-darkWood hover:bg-[#2A1A17]'}`}>
                                {isPdfDownloaded ? (
                                    <><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"></path></svg> 下載完成</>
                                ) : (
                                    <><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> 下載訂單明細 (PDF)</>
                                )}
                            </button>
                            <button onClick={() => setShowEmailPrompt(!showEmailPrompt)} className="inline-flex items-center justify-center gap-2 bg-amberRed hover:bg-[#802020] text-white py-3.5 px-8 rounded-xl font-bold shadow-md transition-all w-full sm:w-auto">
                                傳送 PDF (Email)
                            </button>
                        </div>

                        {showEmailPrompt && (
                            <div className="bg-creamBg border border-warmWood/30 p-6 rounded-2xl max-w-md mx-auto mb-8 animate-[fadeIn_0.3s_ease-out]">
                                <h4 className="font-bold text-darkWood mb-3">請輸入欲接收明細的信箱：</h4>
                                <input type="email" value={resendEmail} onChange={e=>setResendEmail(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-warmWood/30 mb-4 focus:ring-2 focus:ring-amberRed outline-none" placeholder="example@gmail.com" />
                                <button onClick={handleResendEmail} disabled={isResending} className="w-full bg-[#06C755] text-white font-bold py-3 rounded-xl hover:bg-[#05b34c] disabled:opacity-50">
                                    {isResending ? "傳送中..." : "確認傳送"}
                                </button>
                            </div>
                        )}

                        <div className="mt-8 border-t border-warmWood/20 pt-6">
                           {inqMatches.length > 1 ? (
                               <button onClick={() => setInqStatus('multiple_matches')} className="text-amberRed font-bold hover:text-darkWood transition-colors">
                                  ← 返回選擇其他訂單
                               </button>
                           ) : (
                               <button onClick={() => { setInqStatus('idle'); setInqName(''); setInqPhone(''); setInqDate(''); }} className="text-amberRed font-bold hover:text-darkWood transition-colors">
                                  ← 查詢其他訂單
                               </button>
                           )}
                        </div>
                    </div>
                )}
             </div>
          )}

          {/* === 訂單完成 / 成功引導頁面 === */}
          {currentPage === 'success' && (
            <div className="relative z-10 max-w-4xl mx-auto px-4 md:px-8 pt-32 pb-16 fade-in-up">
              
              <div className="bg-pureWhite/95 border border-pureWhite shadow-[0_15px_40px_-10px_rgba(165,42,42,0.1)] rounded-3xl p-6 md:p-12 text-center mb-8">
                <div className="w-20 h-20 bg-[#06C755]/10 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-[#06C755]/20"><svg className="w-10 h-10 text-[#06C755]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg></div>
                <h2 className="text-3xl md:text-4xl font-bold text-darkWood mb-4 font-serif">訂單已成功送出！</h2>
                <p className="text-darkWood/70 text-lg mb-8">感謝您的訂購，專人將盡快與您聯繫確認訂單細節。</p>

                <div className="bg-[#06C755]/10 border border-[#06C755]/30 text-[#06C755] p-4 rounded-xl text-sm font-bold mb-8 flex items-center justify-center gap-3">
                    ✅ 訂單已成功寫入系統！{submittedOrder?.payload?.ordererEmail ? '明細已自動寄送至您的信箱。' : '您可以點擊下方按鈕下載 PDF 留存。'}
                </div>
              </div>

              {submittedOrder && (
                <div className="mb-8">
                  <OrderReceiptContent order={submittedOrder} />
                  <div className="flex justify-center mb-8">
                    <button onClick={() => handleDownloadPDF(submittedOrder.pdfDownloadUrl)} className={`inline-flex items-center justify-center gap-2 text-white py-3.5 px-8 rounded-xl font-bold shadow-md transition-all w-full sm:w-auto ${isPdfDownloaded ? 'bg-[#06C755] hover:bg-[#05b34c]' : 'bg-darkWood hover:bg-[#2A1A17]'}`}>
                        {isPdfDownloaded ? (
                            <><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"></path></svg> 下載完成</>
                        ) : (
                            <><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> 下載訂單明細 (PDF)</>
                        )}
                    </button>
                  </div>
                </div>
              )}

              <hr className="border-warmWood/30 mb-8" />
              <div className="bg-gradient-to-br from-[#FFF8F8] to-pureWhite border border-amberRed/20 rounded-2xl p-6 md:p-8 text-left shadow-[0_8px_24px_rgba(165,42,42,0.05)] mb-8 relative overflow-hidden">
                <div className="absolute -right-8 -top-8 text-amberRed opacity-5 rotate-12 pointer-events-none"><svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5m7.5-9h-2.5l-2-2h-6l-2 2h-2.5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2v-10c0-1.1-.9-2-2-2m-7.5 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
                <div className="relative z-10">
                  <div className="inline-flex items-center gap-2 px-3 py-1 bg-amberRed/10 text-amberRed text-xs font-bold rounded-full tracking-widest mb-4 border border-amberRed/20">✨ 完成訂單特惠獨享</div>
                  <h3 className="text-2xl font-bold text-darkWood mb-4 font-serif">【LINE 照片募集】分享甜蜜時刻</h3>
